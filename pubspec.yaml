name: cybermind_ai
description: "CyberMind AI — AI-powered cybersecurity companion (chat, link/scam/file scanning, password checks, security learning)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management (MVVM view-models)
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Firebase
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.3.0
  firebase_messaging: ^15.1.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.2

  # Networking / AI
  dio: ^5.5.0+1
  retrofit: ^4.2.0
  json_annotation: ^4.9.0

  # Local secure storage (API keys never hard-coded; password hashes never uploaded)
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Routing
  go_router: ^14.2.7

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  easy_localization: ^3.0.7

  # UI / animation
  flutter_animate: ^4.5.0
  lottie: ^3.1.3
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  shimmer: ^3.0.0

  # Scanners / device features
  mobile_scanner: ^5.2.3        # QR scanning
  file_picker: ^8.1.2
  crypto: ^3.0.5                # local hashing for password/file heuristics
  url_launcher: ^6.3.0
  connectivity_plus: ^6.0.5
  package_info_plus: ^8.0.2
  device_info_plus: ^11.1.0
  permission_handler: ^11.3.1

  # Utils
  freezed_annotation: ^2.4.4
  logger: ^2.4.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  retrofit_generator: ^9.1.4
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/images/
